name: CI

on:
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            - name: Check out repo
              uses: actions/checkout@v4

            - name: Set up Java 25
              uses: actions/setup-java@v4
              with:
                  java-version: '25'
                  distribution: 'temurin'
                  cache: gradle

            - name: Compile
              run: ./gradlew classes

    test:
        name: JUnit-Tests
        runs-on: ubuntu-latest

        steps:
            - name: Check out repo
              uses: actions/checkout@v4

            - name: Set up Java 25
              uses: actions/setup-java@v4
              with:
                  java-version: '25'
                  distribution: 'temurin'
                  cache: gradle

            - name: Run tests
              run: ./gradlew test

    format:
        name: spotlessCheck
        runs-on: ubuntu-latest

        steps:
            - name: Check out repo
              uses: actions/checkout@v4

            - name: Set up Java 25
              uses: actions/setup-java@v4
              with:
                  java-version: '25'
                  distribution: 'temurin'
                  cache: gradle

            - name: spotlessCheck cmd
              run: ./gradlew spotlessCheck
